site_name: OpenDNA
site_description: The People's Protein Engineering Platform
site_url: https://dyber-pqc.github.io/OpenDNA/
repo_url: https://github.com/dyber-pqc/OpenDNA
repo_name: dyber-pqc/OpenDNA
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
      - Installation: GETTING_STARTED.md
      - Tutorials: TUTORIALS.md
      - Cookbook: COOKBOOK.md
  - User Guide:
      - Overview: USER_GUIDE.md
      - FAQ: FAQ.md
      - Troubleshooting: TROUBLESHOOTING.md
  - Developer:
      - API Reference: API_REFERENCE.md
      - Architecture: ARCHITECTURE.md
      - Contributing: DEVELOPER.md
  - Science: SCIENCE.md
  - Roadmap: ROADMAP.md
  - Changelog: CHANGELOG.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - attr_list
  - md_in_html

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dyber-pqc/OpenDNA
  generator: false
