            ---

            ## 🔬 For citation

            If you use OpenDNA in published work, please cite:

            ```
            Kleckner, Z. (2026). OpenDNA: A Free, Open-Source Protein Engineering Platform
            for Consumer Hardware. https://github.com/dyber-pqc/OpenDNA
            ```

            See [`CITATION.cff`](https://github.com/dyber-pqc/OpenDNA/blob/main/CITATION.cff) for full citation metadata.

            ---

            ## 🐛 Reporting issues

            - **Bug reports**: [Open an issue](https://github.com/dyber-pqc/OpenDNA/issues/new?template=bug_report.md)
            - **Feature requests**: [Open an issue](https://github.com/dyber-pqc/OpenDNA/issues/new?template=feature_request.md)
            - **Questions**: [Open a discussion](https://github.com/dyber-pqc/OpenDNA/discussions)
            - **Security**: see [SECURITY.md](https://github.com/dyber-pqc/OpenDNA/blob/main/SECURITY.md)

            ---

            ## 📜 License

            **Apache 2.0 + Commons Clause** for the core platform.
            **MIT** for community modules.
            **CC-BY-4.0** for documentation.

            See [LICENSE](https://github.com/dyber-pqc/OpenDNA/blob/main/LICENSE) for full terms.

            ---

            ## ⚠️ Status

            OpenDNA is in **active development**. Use for research, education, and exploration. Always validate critical results experimentally and with established reference tools (AlphaFold2, Rosetta, Schrödinger). Do not use for clinical decisions without independent expert review.

            ---

