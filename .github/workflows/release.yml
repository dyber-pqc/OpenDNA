name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  python-package:
    name: Build Python package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build hatchling

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify build outputs
        run: ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*

  ui-bundle:
    name: Build UI static bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install
        working-directory: ui
        run: npm ci

      - name: Build
        working-directory: ui
        run: npm run build

      - name: Tar dist
        run: |
          cd ui
          tar -czf ../opendna-ui-${{ github.ref_name }}.tar.gz dist

      - name: Upload UI bundle
        uses: actions/upload-artifact@v4
        with:
          name: ui-bundle
          path: opendna-ui-*.tar.gz

  github-release:
    name: Create GitHub Release
    needs: [python-package, ui-bundle]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/python-package/*
            artifacts/ui-bundle/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          name: "OpenDNA ${{ github.ref_name }}"
          body: |
            # OpenDNA ${{ github.ref_name }}

            **The People's Protein Engineering Platform** — free, open-source protein structure prediction, sequence design, and analysis that runs on consumer hardware.

            ---

            ## 📦 What's in this release

            ### Python package (Server + SDK + CLI)
            - `opendna-X.Y.Z.tar.gz` — source distribution
            - `opendna-X.Y.Z-py3-none-any.whl` — pre-built wheel (Python 3.10+, all platforms)

            ### UI bundle (Web frontend)
            - `opendna-ui-${{ github.ref_name }}.tar.gz` — pre-built React + Vite static bundle, ready to serve from any HTTP server

            ### Desktop installers
            Native desktop installers are built separately by the **Tauri Desktop Build** workflow and attached to a different release. Look for `.exe`, `.msi`, `.dmg`, `.AppImage`, and `.deb` files in [Releases](https://github.com/dyber-pqc/OpenDNA/releases).

            ---

            ## 🚀 Quick install

            ### Option 1: Python package (CLI + API server + SDK)

            ```bash
            # Core install (lightweight, no ML models)
            pip install opendna

            # With ML stack (ESMFold, ESM-IF1, ~3 GB of dependencies)
            pip install opendna[ml]

            # With everything (ML + MD + dev tooling)
            pip install opendna[all]
            ```

            Then start the server:
            ```bash
            opendna serve --port 8765
            ```

            ### Option 2: Web UI bundle

            ```bash
            tar -xzf opendna-ui-${{ github.ref_name }}.tar.gz
            cd dist
            python -m http.server 5173
            # or use any static file server
            ```

            Then open http://localhost:5173 in your browser. The UI expects the API server at `http://localhost:8765`.

            ### Option 3: Python SDK from your own scripts

            ```python
            from opendna.sdk import Client

            with Client("http://localhost:8765") as c:
                # Score a sequence (instant, no model download)
                result = c.evaluate("MKTVRQERLKSIVRILER")
                print(f"Score: {result.overall:.2f}")

                # Fold a protein (downloads ESMFold ~8 GB on first run)
                fold = c.fold("MKTVRQERLK")
                fold.save("output.pdb")

                # Run the AI agent on a high-level goal
                result = c.agent("Import ubiquitin and tell me about it")
                print(result["final_answer"])
            ```

            ---

            ## 🧪 What you can do with this release

            - **Predict 3D protein structures** with ESMFold (state-of-the-art, no MSA needed)
            - **Design alternative sequences** with ESM-IF1 inverse folding
            - **Run automated optimization loops** (fold → design → fold → keep best → repeat)
            - **Compute ~50 sequence and structure analyses**: Lipinski, hydropathy, disorder, transmembrane, signal peptides, aggregation, phosphorylation/glycosylation sites, secondary structure, Ramachandran, binding pockets, H-bonds, salt bridges, disulfides, pKa, QSAR descriptors, antibody CDR detection, MolProbity-style validation, and more
            - **Predict mutation effects** (ΔΔG estimation)
            - **Estimate synthesis cost** (Twist Bioscience, IDT, GenScript) and carbon footprint
            - **Import proteins** from UniProt, RCSB PDB, and AlphaFold DB
            - **Compare structures** with Kabsch RMSD
            - **Run molecular dynamics** with OpenMM (when installed) and explicit TIP3P solvent
            - **Use the LLM agent** for natural-language workflows (with Ollama/Anthropic/OpenAI support)
            - **Run the self-benchmark** against AlphaFold DB references

            ---

            ## 📋 System requirements

            ### Minimum (CPU mode, slow but works)
            - Python 3.10 or later
            - 8 GB RAM
            - 20 GB free disk
            - Any 64-bit OS (Windows 10+, macOS 11+, Ubuntu 20.04+)

            ### Recommended (GPU mode, fast)
            - 16 GB RAM
            - NVIDIA RTX 3060+ (8 GB VRAM) **OR** Apple Silicon M1+
            - 50 GB free disk
            - CUDA-enabled PyTorch for NVIDIA: `pip install torch --index-url https://download.pytorch.org/whl/cu124`

            ### Optimal (workstation)
            - 32+ GB RAM
            - NVIDIA RTX 4090 (24 GB VRAM) or A6000
            - 200 GB free disk

            ---

