name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install OpenDNA core (no heavy ML dependencies)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run lightweight tests
        run: python -m pytest tests/python/ -v --tb=short -m "not heavy"

      - name: Lint with ruff (non-blocking)
        run: |
          python -m pip install ruff
          ruff check python/ || true
        continue-on-error: true

  rust-tests:
    name: Rust on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Build core crates only (skip PyO3 bindings on CI)
        run: |
          cargo build -p opendna-core
          cargo build -p opendna-hal

      - name: Run Rust tests
        run: |
          cargo test -p opendna-core
          cargo test -p opendna-hal

      - name: Check formatting (non-blocking)
        run: cargo fmt --check
        continue-on-error: true

      - name: Run clippy (non-blocking)
        run: |
          cargo clippy -p opendna-core -- -D warnings
          cargo clippy -p opendna-hal -- -D warnings
        continue-on-error: true

  ui-build:
    name: UI build & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: TypeScript check
        working-directory: ui
        run: npx tsc --noEmit

      - name: Production build
        working-directory: ui
        run: npm run build
