name: Tauri Desktop Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-desktop:
    name: Build for ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./ui/src-tauri -> target

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Build UI
        working-directory: ui
        run: npm run build

      - name: Build Tauri app (unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ui
          tagName: ${{ github.ref_name }}-desktop
          releaseName: "OpenDNA ${{ github.ref_name }} - Desktop Installers"
          releaseBody: |
            # OpenDNA ${{ github.ref_name }} - Desktop Installers

            Native cross-platform desktop installers for the **OpenDNA protein engineering platform**.

            > **Note**: This is a separate release entry from the Python package release with the same version. The desktop installers are built and attached here. The pip install package is at the matching `${{ github.ref_name }}` tag without `-desktop`.

            ## 📥 Download

            Pick the installer for your operating system from the **Assets** section below:

            | OS | File pattern | Recommended |
            |---|---|---|
            | **Windows** | `*.msi` | ⭐ Microsoft Installer, double-click to install |
            | **Windows** | `*-setup.exe` | NSIS installer (alternative) |
            | **macOS** | `*.dmg` | ⭐ Universal binary (Apple Silicon + Intel) |
            | **macOS** | `*.app.tar.gz` | Pre-built app bundle |
            | **Linux** | `*.AppImage` | ⭐ Single-file portable executable |
            | **Linux** | `*.deb` | Debian/Ubuntu package |

            ## 🚀 First-time setup

            **Important**: The desktop app is a UI shell. The Python backend must be installed separately.

            1. **Install Python 3.10+** if you don't have it: https://python.org
            2. **Install the OpenDNA Python backend**:
               ```bash
               # Lightweight install (works for sequence analysis, no ML models)
               pip install opendna

               # Full ML stack (ESMFold, ESM-IF1 - downloads ~3 GB on first use)
               pip install opendna[ml]

               # Everything (ML + MD + dev tooling)
               pip install opendna[all]
               ```
            3. **Launch OpenDNA** - it will auto-start the Python API server on port 8765
            4. **First fold** will download ESMFold (~8 GB) on demand. Subsequent folds are instant.

            ## ⚠️ Security notes (unsigned builds)

            These builds are **unsigned** and your OS will warn you on first launch:

            ### Windows
            - Windows SmartScreen will say *"Windows protected your PC"*
            - Click **More info** → **Run anyway**

            ### macOS
            - First launch: *"OpenDNA can't be opened because Apple cannot check it for malicious software"*
            - **Right-click the app → Open** (do not double-click)
            - Confirm **Open** in the dialog
            - Subsequent launches work normally

            ### Linux AppImage
            ```bash
            chmod +x OpenDNA_*.AppImage
            ./OpenDNA_*.AppImage
            ```

            We will provide signed builds in a future release once code-signing certificates are configured.

            ## 🧪 Verify the install works

            After launching OpenDNA:

            1. The OpenDNA window should open with the protein viewer interface
            2. Click the **Status** action or press **Ctrl+K** → type *"status"* to see hardware info
            3. **Quick test (no model download)**: Click **Tools → Score Protein** with sequence:
               ```
               MKTVRQERLKSIVRILER
               ```
               You should see an instant quality score
            4. **Real test (downloads ESMFold ~8 GB)**: Click **Import → ubiquitin** to load a real protein
            5. **Full test**: Click **Predict Structure** then **Design 10 Sequences**

            ## 📚 What's in OpenDNA

            - **Structure prediction** (ESMFold) - state-of-the-art, no MSA needed
            - **Sequence design** (ESM-IF1) - inverse folding for backbone preservation
            - **~50 sequence and structure analyses** - Lipinski, hydropathy, disorder, transmembrane, signal peptides, aggregation, PTM sites, secondary structure, Ramachandran, pockets, bonds, pKa, MolProbity validation, antibody CDRs, QSAR, and more
            - **Iterative design loop** - automated fold→design→fold→keep best
            - **Mutation effect prediction** (ΔΔG estimation)
            - **Molecular dynamics** (OpenMM with explicit solvent when installed)
            - **Multimer prediction** (Boltz when installed)
            - **AI agent** with LLM tool calling (Ollama/Anthropic/OpenAI)
            - **UniProt/PDB/AlphaFold DB import**
            - **Cost & carbon estimates** for synthesis
            - **Protein Academy** with interactive tutorials

            ## 📚 Documentation

            - [**Getting Started**](https://github.com/dyber-pqc/OpenDNA/blob/main/docs/GETTING_STARTED.md)
            - [**User Guide**](https://github.com/dyber-pqc/OpenDNA/blob/main/docs/USER_GUIDE.md) - every feature
            - [**Tutorials**](https://github.com/dyber-pqc/OpenDNA/blob/main/docs/TUTORIALS.md) - 10 walkthroughs
            - [**Cookbook**](https://github.com/dyber-pqc/OpenDNA/blob/main/docs/COOKBOOK.md) - 20 recipes
            - [**FAQ**](https://github.com/dyber-pqc/OpenDNA/blob/main/docs/FAQ.md)
            - [**Troubleshooting**](https://github.com/dyber-pqc/OpenDNA/blob/main/docs/TROUBLESHOOTING.md)
            - [**Science behind it**](https://github.com/dyber-pqc/OpenDNA/blob/main/docs/SCIENCE.md) - what each algorithm does

            ## 🐛 Found a bug?

            [Open an issue](https://github.com/dyber-pqc/OpenDNA/issues/new?template=bug_report.md) with:
            - Your OS and version
            - Steps to reproduce
            - Screenshots if applicable
            - Output from the API server terminal (if accessible)

            ## 🔬 For citation in publications

            ```
            Kleckner, Z. (2026). OpenDNA: A Free, Open-Source Protein Engineering Platform
            for Consumer Hardware. https://github.com/dyber-pqc/OpenDNA
            ```

            See [CITATION.cff](https://github.com/dyber-pqc/OpenDNA/blob/main/CITATION.cff) for full citation metadata.

            ## 📜 License

            **Apache 2.0 + Commons Clause** for the core platform.
            **MIT** for community modules.
            **CC-BY-4.0** for documentation.

            See [LICENSE](https://github.com/dyber-pqc/OpenDNA/blob/main/LICENSE) for full terms.

            ## 💝 Support the project

            - ⭐ **Star the repo** to help us grow
            - 🐛 **Report bugs** when you find them
            - 📖 **Improve docs** if you find typos or unclear explanations
            - 💻 **Contribute code** - see [CONTRIBUTING.md](https://github.com/dyber-pqc/OpenDNA/blob/main/CONTRIBUTING.md)
            - 💬 **Share what you build** with `#opendna` so others can find it

            ---

            **Auto-generated changelog below ⬇**
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

      - name: Upload bundle artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opendna-${{ matrix.platform }}
          path: |
            ui/src-tauri/target/release/bundle/**/*
          if-no-files-found: warn
