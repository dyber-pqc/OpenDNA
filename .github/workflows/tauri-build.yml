name: Tauri Desktop Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-desktop:
    name: Build for ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./ui/src-tauri -> target

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Build UI
        working-directory: ui
        run: npm run build

      - name: Build Tauri app (unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ui
          tagName: ${{ github.ref_name }}
          releaseName: "OpenDNA ${{ github.ref_name }}"
          releaseBody: |
            ## OpenDNA ${{ github.ref_name }}

            Cross-platform desktop installers for the OpenDNA protein engineering platform.

            ### Downloads

            - **Windows**: `.msi` or `.exe` installer (NSIS)
            - **macOS**: `.dmg` (Apple Silicon and Intel)
            - **Linux**: `.AppImage` or `.deb` package

            ### Requirements

            - Python 3.10+ installed (https://python.org)
            - On first launch, run `pip install opendna` to install the Python backend

            **Note:** These builds are unsigned. On macOS you may need to right-click → Open the first time. On Windows you may see a SmartScreen warning.

            ### Changes

            See [CHANGELOG.md](https://github.com/dyber-pqc/OpenDNA/blob/main/docs/CHANGELOG.md)
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

      - name: Upload bundle artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opendna-${{ matrix.platform }}
          path: |
            ui/src-tauri/target/release/bundle/**/*
          if-no-files-found: warn
